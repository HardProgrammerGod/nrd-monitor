<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRD Threat Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-950 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-400">🛡️ NRD Monitor Pro</h1>
            <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">v1.0.0 (Demo)</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
                <p class="text-sm text-slate-400 uppercase tracking-wider">Обработано доменов</p>
                <p id="stat-total" class="text-3xl font-extrabold mt-2 text-white">...</p>
            </div>
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
                <p class="text-sm text-slate-400 uppercase tracking-wider">Заблокировано угроз</p>
                <p id="stat-blocked" class="text-3xl font-extrabold mt-2 text-rose-500">...</p>
            </div>
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
                <p class="text-sm text-slate-400 uppercase tracking-wider">Последнее обновление</p>
                <p id="stat-time" class="text-sm font-mono mt-4 text-emerald-400">...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 space-y-4">
                <h2 class="text-lg font-semibold text-white">Intel Search (Проверка домена)</h2>
                <div class="flex gap-2">
                    <input id="search-input" type="text" placeholder="example.xyz" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
                    <button onclick="checkDomain()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-6 py-2 rounded-lg transition">Проверить</button>
                </div>
                <div id="search-result" class="hidden p-4 rounded-lg border bg-slate-900">
                    </div>
            </div>

            <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
                <h2 class="text-lg font-semibold text-white mb-4">Топ опасных зон (TLD)</h2>
                <div class="h-48 flex items-center justify-center">
                    <canvas id="tldChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api/v1';

        // Загрузка статистики при старте страницы
        async function loadDashboard() {
            try {
                // Загружаем общую инфу
                const resStats = await fetch(`${API_URL}/stats`);
                const stats = await resStats.parse ? await resStats.json() : await resStats.json();
                document.getElementById('stat-total').innerText = stats.total_domains_processed.toLocaleString();
                document.getElementById('stat-blocked').innerText = stats.active_threats_blocked.toLocaleString();
                document.getElementById('stat-time').innerText = stats.last_updated;

                // Загружаем данные для графика
                const resTlds = await fetch(`${API_URL}/tlds`);
                const tlds = await resTlds.json();
                
                renderChart(tlds);
            } catch (err) {
                console.error("Бэкенд не запущен или недоступен", err);
            }
        }

        // Логика проверки домена через API
        async function checkDomain() {
            const domain = document.getElementById('search-input').value;
            if (!domain) return;

            const res = await fetch(`${API_URL}/search?domain=${domain}`);
            const data = await res.json();

            const resultDiv = document.getElementById('search-result');
            resultDiv.classList.remove('hidden');

            if (data.status === 'DANGER') {
                resultDiv.className = "p-4 rounded-lg border border-rose-800 bg-rose-950/30 text-rose-300 space-y-1";
                resultDiv.innerHTML = `<strong>⚠️ ОБНАРУЖЕНА УГРОЗА (${data.risk_score}%)</strong><p class="text-sm">${data.reason}</p>`;
            } else {
                resultDiv.className = "p-4 rounded-lg border border-emerald-800 bg-emerald-950/30 text-emerald-300 space-y-1";
                resultDiv.innerHTML = `<strong>✅ Чистый домен (${data.risk_score}%)</strong><p class="text-sm">${data.reason}</p>`;
            }
        }

        // Отрисовка графика Chart.js
        function renderChart(tldData) {
            const ctx = document.getElementById('tldChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: tldData.map(item => '.' + item.tld),
                    datasets: [{
                        label: 'Количество доменов',
                        data: tldData.map(item => item.count),
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        loadDashboard();
    </script>
</body>
</html>
